<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#020510">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>FGO Reader</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; margin: 0; overflow: hidden; user-select: none; -webkit-user-select: none; }

        /* === CHAPTER SELECT === */
        #chapter-screen {
            position: absolute; inset: 0; z-index: 100;
            background: radial-gradient(ellipse at 50% 20%, #0d1840 0%, #020510 100%);
            overflow-y: auto; display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }
        #chapter-header { text-align: center; padding: 28px 20px 20px; flex-shrink: 0; }
        #ch-title {
            font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 900; letter-spacing: 0.18em;
            background: linear-gradient(135deg, #c8a84b, #ffe08a, #c8a84b);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        #ch-subtitle {
            font-size: 0.72rem; letter-spacing: 0.3em; color: rgba(160,190,255,0.35);
            text-transform: uppercase; margin-top: 5px;
        }
        #chapter-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px; padding: 0 16px 30px;
            max-width: 1100px; margin: 0 auto; width: 100%;
        }
        @media (max-width: 520px) {
            #chapter-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
        }
        .war-card {
            position: relative; cursor: pointer; border-radius: 7px; overflow: hidden;
            border: 1px solid rgba(80,130,255,0.12);
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
            background: #050a20;
        }
        .war-card:hover {
            transform: scale(1.04); border-color: rgba(120,180,255,0.55);
            box-shadow: 0 0 26px rgba(60,120,255,0.45);
        }
        .war-card img { width: 100%; display: block; }
        .war-card-fallback {
            height: 76px; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0a1540, #0d2060);
            font-size: 0.8rem; color: rgba(150,180,255,0.5); padding: 8px; text-align: center;
        }
        .war-card-name {
            padding: 7px 10px 9px; font-size: 0.68rem; line-height: 1.35;
            color: rgba(170,200,255,0.65);
        }

        /* === QUEST SELECT === */
        #quest-screen {
            position: absolute; inset: 0; z-index: 100;
            background: radial-gradient(ellipse at 50% 20%, #0d1840 0%, #020510 100%);
            display: none; flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }
        #quest-back {
            position: absolute; top: calc(10px + env(safe-area-inset-top)); left: 12px; z-index: 10;
            background: rgba(10,20,60,0.8); border: 1px solid rgba(80,130,255,0.3);
            color: #c8ddff; padding: 9px 16px; border-radius: 6px; cursor: pointer;
            font-size: 0.85rem; transition: background 0.15s;
        }
        #quest-back:hover { background: rgba(30,60,160,0.8); }
        #quest-war-banner { display: block; flex-shrink: 0; margin: 0 auto; max-width: min(440px, 90vw); }
        #quest-war-title {
            padding: 14px 18px 10px; font-size: 0.95rem; color: #c8ddff; font-weight: bold;
            border-bottom: 1px solid rgba(80,130,255,0.2); flex-shrink: 0; line-height: 1.4;
        }
        #quest-list-container { flex: 1; overflow-y: auto; padding: 10px 14px; -webkit-overflow-scrolling: touch; }
        .quest-loading { color: rgba(160,190,255,0.5); text-align: center; padding: 24px; font-size: 0.9rem; }
        .spot-group { margin-bottom: 8px; }
        .spot-name {
            font-size: 0.65rem; letter-spacing: 0.18em; color: rgba(100,140,255,0.45);
            text-transform: uppercase; margin-bottom: 5px; padding-left: 4px;
        }
        .quest-item {
            padding: 12px 14px; border-radius: 6px; cursor: pointer;
            border: 1px solid transparent; margin-bottom: 3px;
            font-size: 0.92rem; color: #a0bcf0; transition: background 0.12s, border-color 0.12s;
            background: rgba(10,20,60,0.35);
        }
        .quest-item:hover { background: rgba(20,50,120,0.55); border-color: rgba(80,130,255,0.25); }
        #quest-launch-bar { padding: 8px 14px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(80,130,255,0.18); flex-shrink: 0; }
        #quest-log { color: #f1c40f; font-size: 0.82rem; text-align: center; min-height: 16px; }

        /* === READER === */
        #reader-container { display: none; width: 100%; height: 100%; position: relative; overflow: hidden; }
        #reader-container.ui-hidden #text-box,
        #reader-container.ui-hidden #options-btn {
            display: none;
        }
        #reader-container.prompt-hidden #next-icon {
            display: none;
        }
        #visual-stage, #camera-layer { position: absolute; inset: 0; pointer-events: none; }
        #visual-stage { z-index: 0; }
        #camera-layer { transform-origin: center center; }
        #bg-layer { width: 100%; height: 100%; background-size: cover; background-position: center; position: absolute; top: 0; left: 0; z-index: 0; }

        /* Image de scène (imageSet : cut-in / CG). Ces images partagent la même
           largeur de référence (1024) que le décor : on les affiche donc à la
           largeur de l'écran, ancrées en haut, pour les composer comme le jeu. */
        #cut-image { position: absolute; inset: 0; z-index: 4; background-repeat: no-repeat; background-position: center top; background-size: 100% auto; display: none; pointer-events: none; }

        #characters-layer { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
        .char-container {
            position: absolute; bottom: 0; left: 50%; transform: translate(calc(-50% + var(--char-x, 0px)), var(--char-y, 0px));
            overflow: hidden; pointer-events: none; display: none;
            transition: transform 0ms ease-in-out, opacity 0ms linear, filter 0.18s ease-out;
        }
        .char-container.dimmed { filter: brightness(0.55); }
        .char-motion { position: absolute; inset: 0; }
        .char-body { position: absolute; background-repeat: no-repeat; }
        .char-face { position: absolute; background-repeat: no-repeat; z-index: 6; display: none; }
        /* Effet "appel vidéo" (communicationChara) : transparence + scanlines */
        .char-container.comm .char-body, .char-container.comm .char-face { opacity: 0.5; }
        .char-scanlines {
            position: absolute; display: none; pointer-events: none; z-index: 7;
            background: repeating-linear-gradient(0deg, rgba(170,210,255,0.20) 0px, rgba(170,210,255,0.20) 1px, transparent 2px, transparent 4px);
            mix-blend-mode: screen; animation: comm-scan 5s linear infinite;
        }
        @keyframes comm-scan { from { background-position: 0 0; } to { background-position: 0 64px; } }

        #wipe-layer, #fade-layer, #flash-layer {
            position: absolute; inset: 0; display: none; pointer-events: none;
        }
        #wipe-layer { z-index: 7; background: #000; }
        #fade-layer { z-index: 8; background: #000; opacity: 0; }
        #flash-layer { z-index: 9; opacity: 0; }

        #text-box {
            --u: var(--fgo-ui-unit, 1px);
            position: absolute;
            width: calc(980 * var(--u)); height: calc(138 * var(--u));
            bottom: calc(12 * var(--u)); left: 50%; transform: translateX(-50%);
            z-index: 10; cursor: pointer;
            border: calc(1 * var(--u)) solid rgba(80,155,220,0.65);
            border-radius: calc(8 * var(--u));
            background:
                repeating-linear-gradient(0deg, rgba(145,210,255,0.035) 0, rgba(145,210,255,0.035) calc(1 * var(--u)), transparent calc(1 * var(--u)), transparent calc(3 * var(--u))),
                radial-gradient(ellipse at 30% 0%, rgba(20,105,125,0.34), transparent 48%),
                linear-gradient(100deg, rgba(4,38,69,0.80), rgba(1,22,63,0.87) 52%, rgba(3,35,75,0.82));
            box-shadow:
                inset 0 calc(2 * var(--u)) 0 rgba(89,181,235,0.45),
                inset 0 0 calc(20 * var(--u)) rgba(0,15,50,0.7),
                0 calc(2 * var(--u)) calc(8 * var(--u)) rgba(0,0,0,0.35);
            padding: calc(38 * var(--u)) calc(82 * var(--u)) calc(16 * var(--u)) calc(50 * var(--u));
            font-family: "Segoe UI", sans-serif;
        }
        #text-box.has-overflow {
            cursor: default;
        }
        #text-box.has-overflow.at-bottom {
            cursor: pointer;
        }
        #text-box::before {
            content: ""; position: absolute; pointer-events: none;
            top: calc(-34 * var(--u)); left: calc(260 * var(--u));
            width: calc(180 * var(--u)); height: calc(48 * var(--u));
            background: linear-gradient(90deg, transparent, rgba(17,77,151,0.2) 18%, transparent);
        }
        #text-box::after {
            content: ""; position: absolute; pointer-events: none;
            right: calc(55 * var(--u)); bottom: calc(2 * var(--u));
            width: calc(170 * var(--u)); height: calc(84 * var(--u)); opacity: 0.16;
            background:
                linear-gradient(45deg, transparent 42%, rgba(55,125,230,0.8) 43% 57%, transparent 58%) 0 0 / calc(42 * var(--u)) calc(42 * var(--u)),
                linear-gradient(-45deg, transparent 42%, rgba(55,125,230,0.8) 43% 57%, transparent 58%) 0 0 / calc(42 * var(--u)) calc(42 * var(--u));
            transform: skewX(-18deg);
        }
        #speaker-tab {
            position: absolute; top: calc(-34 * var(--u)); left: calc(-18 * var(--u));
            width: calc(330 * var(--u)); height: calc(48 * var(--u));
            padding: calc(7 * var(--u)) calc(28 * var(--u)) calc(7 * var(--u)) calc(34 * var(--u));
            display: flex; align-items: center;
            background: rgba(142,220,225,0.82);
            clip-path: polygon(
                calc(18 * var(--u)) 0,
                100% 0,
                calc(100% - 30 * var(--u)) 100%,
                calc(18 * var(--u)) 100%,
                0 50%
            );
            filter: drop-shadow(0 calc(2 * var(--u)) calc(2 * var(--u)) rgba(0,0,0,0.45));
        }
        #speaker-tab::before {
            content: ""; position: absolute; inset: calc(2 * var(--u));
            background:
                repeating-linear-gradient(0deg, rgba(150,230,255,0.045) 0, rgba(150,230,255,0.045) calc(1 * var(--u)), transparent calc(1 * var(--u)), transparent calc(3 * var(--u))),
                linear-gradient(100deg, rgba(22,101,151,0.93), rgba(17,77,151,0.82) 58%, rgba(15,56,132,0.24));
            clip-path: polygon(
                calc(16 * var(--u)) 0,
                100% 0,
                calc(100% - 28 * var(--u)) 100%,
                calc(16 * var(--u)) 100%,
                0 50%
            );
        }
        #speaker {
            position: relative; z-index: 1;
            color: #c8ddff; font-weight: bold;
            font-size: calc(29 * var(--u)); line-height: 1;
            text-shadow: calc(1 * var(--u)) calc(2 * var(--u)) calc(2 * var(--u)) #071329, 0 0 calc(2 * var(--u)) #071329;
        }
        #text {
            position: relative; z-index: 1;
            font-size: calc(28 * var(--u)); line-height: 1.43;
            color: #eef2ff;
            white-space: pre-line;
            max-height: calc(84 * var(--u));
            overflow-y: auto;
            overscroll-behavior: contain;
            touch-action: pan-y;
            -webkit-overflow-scrolling: touch;
            padding-right: calc(14 * var(--u));
            scrollbar-width: thin;
            scrollbar-color: rgba(150,210,255,0.75) rgba(5,20,55,0.35);
            text-shadow: calc(1 * var(--u)) calc(2 * var(--u)) calc(2 * var(--u)) #071329, 0 0 calc(2 * var(--u)) #071329;
        }
        #text::-webkit-scrollbar { width: calc(7 * var(--u)); }
        #text::-webkit-scrollbar-track { background: rgba(5,20,55,0.35); border-radius: calc(7 * var(--u)); }
        #text::-webkit-scrollbar-thumb { background: rgba(150,210,255,0.75); border-radius: calc(7 * var(--u)); }
        #text-box.has-overflow #text {
            pointer-events: auto;
            cursor: grab;
        }
        #text-box.has-overflow.at-bottom #text { cursor: pointer; }
        #text.scroll-dragging { cursor: grabbing !important; }
        #text-overflow-indicator {
            display: none; position: absolute; pointer-events: none; z-index: 2;
            left: calc(50 * var(--u)); right: calc(82 * var(--u)); bottom: calc(16 * var(--u));
            height: calc(26 * var(--u));
            background: linear-gradient(transparent, rgba(2,16,48,0.82));
        }
        #text-box.has-overflow:not(.at-bottom) #text-overflow-indicator { display: block; }
        /* messageOff : on masque le contenu de la boîte mais on garde la zone cliquable */
        #text-box.msg-hidden { background: transparent; border-color: transparent; box-shadow: none; }
        #text-box.msg-hidden #speaker-tab, #text-box.msg-hidden #text, #text-box.msg-hidden #dialog-controls, #text-box.msg-hidden::before, #text-box.msg-hidden::after { visibility: hidden; }
        #dialog-controls {
            position: absolute; z-index: 2;
            top: calc(5 * var(--u)); right: calc(9 * var(--u));
            width: calc(38 * var(--u)); height: calc(125 * var(--u));
            color: rgba(239,245,242,0.92);
            font-family: "Segoe UI", sans-serif;
            text-align: center;
            text-shadow: 0 calc(1 * var(--u)) calc(2 * var(--u)) #061429;
        }
        #dialog-log-button {
            appearance: none;
            display: block;
            width: 100%;
            margin: 0;
            padding: 0;
            border: 0;
            background: transparent;
            color: inherit;
            font: inherit;
            text-align: inherit;
            cursor: pointer;
        }
        .dialog-log-arrow {
            width: 0; height: 0; margin: 0 auto calc(1 * var(--u));
            border-left: calc(13 * var(--u)) solid transparent;
            border-right: calc(13 * var(--u)) solid transparent;
            border-bottom: calc(10 * var(--u)) solid rgba(239,245,242,0.9);
        }
        .dialog-log, .dialog-auto { font-size: calc(11 * var(--u)); line-height: 1; }
        .dialog-auto-button {
            width: calc(27 * var(--u)); height: calc(27 * var(--u)); margin: calc(7 * var(--u)) auto calc(2 * var(--u));
            border: calc(2 * var(--u)) solid rgba(239,245,242,0.82);
            border-radius: calc(3 * var(--u)); display: grid; place-items: center;
        }
        .dialog-auto-button::after {
            content: ""; margin-left: calc(2 * var(--u));
            border-top: calc(7 * var(--u)) solid transparent;
            border-bottom: calc(7 * var(--u)) solid transparent;
            border-left: calc(10 * var(--u)) solid rgba(239,245,242,0.88);
        }
        #next-icon {
            position: absolute; bottom: calc(3 * var(--u)); right: calc(8 * var(--u));
            width: calc(34 * var(--u)); height: calc(34 * var(--u));
            font-size: 0; animation: pulse-next 1.4s ease-in-out infinite;
        }
        #next-icon::before, #next-icon::after {
            content: ""; position: absolute; left: 50%;
            width: calc(14 * var(--u)); height: calc(14 * var(--u));
            border: calc(2 * var(--u)) solid #fff; transform: translateX(-50%) rotate(45deg);
            box-shadow: 0 0 calc(3 * var(--u)) #2878ff, inset 0 0 calc(2 * var(--u)) #2878ff;
        }
        #next-icon::before { top: calc(1 * var(--u)); }
        #next-icon::after { top: calc(13 * var(--u)); }
        @keyframes pulse-next { 0%,100% { opacity:0.3; } 50% { opacity:1; } }

        #options-btn { position: absolute; top: calc(8px + env(safe-area-inset-top)); right: 10px; z-index: 20; background: rgba(40,40,40,0.75); color: white; border: 1px solid #555; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.15rem; display: flex; align-items: center; justify-content: center; }
        #options-overlay { display: none; position: absolute; inset: 0; z-index: 49; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        #options-overlay.active { display: flex; }
        #options-box {
            background: linear-gradient(160deg, #0a0e1f, #0d1530);
            border: 1px solid rgba(80,130,255,0.35); border-radius: 12px;
            padding: 28px 32px; display: flex; flex-direction: column; gap: 18px;
            min-width: min(300px, 84vw); box-shadow: 0 0 30px rgba(20,60,180,0.3);
        }
        #options-box h3 { margin: 0; color: rgba(160,190,255,0.7); font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; text-align: center; }
        .opt-row { display: flex; flex-direction: column; gap: 8px; }
        .opt-label { font-size: 0.9rem; color: #c8ddff; display: flex; justify-content: space-between; }
        #volume-slider { width: 100%; accent-color: #3a7bd5; cursor: pointer; height: 4px; }
        #options-box .opt-btn { padding: 12px 20px; border-radius: 7px; font-size: 0.95rem; cursor: pointer; border: 1px solid rgba(80,130,255,0.3); background: rgba(20,40,100,0.6); color: #c8ddff; transition: background 0.15s; }
        #options-box .opt-btn:hover { background: rgba(40,70,160,0.8); }

        #end-overlay { display: none; position: absolute; inset: 0; z-index: 50; background: rgba(0,0,0,0.75); justify-content: center; align-items: center; }
        #end-overlay.active { display: flex; }
        #end-box { background: #1a1a2e; border: 1px solid #3498db; border-radius: 10px; padding: 32px 36px; text-align: center; display: flex; flex-direction: column; gap: 16px; min-width: min(380px, 86vw); }
        #end-box h2 { margin: 0; color: #f1c40f; font-size: 1.3rem; }
        #end-box p { margin: 0; color: #aaa; font-size: 0.95rem; }
        #end-box button { padding: 13px 24px; border-radius: 6px; font-size: 1rem; cursor: pointer; border: none; }
        #btn-next-quest { background: #3498db; color: white; }
        #btn-next-quest:hover { background: #2980b9; }
        #btn-back-menu { background: #333; color: #ccc; }
        #btn-back-menu:hover { background: #444; }

        #choice-overlay {
            --u: var(--fgo-ui-unit, 1px);
            display: none; position: absolute; inset: 0; z-index: 50;
            flex-direction: column; justify-content: flex-start; align-items: center;
            padding-top: calc(132 * var(--u));
        }
        #choice-overlay.active { display: flex; }
        #choice-box {
            width: calc(780 * var(--u));
            display: flex; flex-direction: column; gap: calc(26 * var(--u));
        }
        #choice-box p { display: none; }
        .choice-btn {
            position: relative; isolation: isolate;
            width: 100%; min-height: calc(72 * var(--u));
            border: 0; padding: calc(12 * var(--u)) calc(38 * var(--u));
            background: linear-gradient(100deg, #a8e6f0, #5395e6 55%, #315eb4);
            clip-path: polygon(
                calc(18 * var(--u)) 0,
                100% 0,
                100% calc(100% - 18 * var(--u)),
                calc(100% - 18 * var(--u)) 100%,
                0 100%,
                0 calc(18 * var(--u))
            );
            color: #f4f4f4; cursor: pointer;
            font-family: "Segoe UI", sans-serif;
            font-size: calc(29 * var(--u)); line-height: 1.22;
            text-align: center;
            text-shadow: 0 calc(2 * var(--u)) calc(2 * var(--u)) #000;
            filter: drop-shadow(0 calc(3 * var(--u)) calc(2 * var(--u)) rgba(0,0,0,0.5));
            transition: filter 0.12s ease, transform 0.12s ease;
        }
        .choice-btn::before {
            content: ""; position: absolute; z-index: -1;
            inset: calc(3 * var(--u));
            background: linear-gradient(90deg, rgba(11,14,19,0.98), #000 38%);
            clip-path: polygon(
                calc(16 * var(--u)) 0,
                100% 0,
                100% calc(100% - 16 * var(--u)),
                calc(100% - 16 * var(--u)) 100%,
                0 100%,
                0 calc(16 * var(--u))
            );
        }
        .choice-btn::after {
            content: ""; position: absolute; z-index: -1; pointer-events: none;
            top: calc(3 * var(--u)); bottom: calc(3 * var(--u)); left: calc(3 * var(--u));
            width: calc(235 * var(--u)); opacity: 0.15;
            background:
                linear-gradient(135deg, transparent 44%, #8290ad 45% 55%, transparent 56%) 0 0 / calc(34 * var(--u)) calc(34 * var(--u)),
                linear-gradient(45deg, transparent 44%, #8290ad 45% 55%, transparent 56%) 0 0 / calc(34 * var(--u)) calc(34 * var(--u));
            clip-path: polygon(calc(16 * var(--u)) 0, 100% 0, 100% 100%, 0 100%, 0 calc(16 * var(--u)));
            -webkit-mask-image: linear-gradient(90deg, #000 58%, transparent);
            mask-image: linear-gradient(90deg, #000 58%, transparent);
        }
        .choice-btn:hover, .choice-btn:focus-visible {
            filter: brightness(1.18) drop-shadow(0 calc(3 * var(--u)) calc(3 * var(--u)) rgba(0,0,0,0.6));
            outline: none;
        }
        .choice-btn:active { transform: scale(0.99); }

        #log-overlay {
            --u: var(--fgo-ui-unit, 1px);
            display: none;
            position: absolute; inset: 0; z-index: 55;
            background: rgba(0,0,0,0.68);
        }
        #log-overlay.active { display: block; }
        #log-panel {
            position: absolute; inset: 0;
            overflow-y: auto; overscroll-behavior: contain;
            padding: calc(26 * var(--u)) calc(78 * var(--u)) calc(115 * var(--u)) calc(112 * var(--u));
            scrollbar-width: thin;
            scrollbar-color: #fff rgba(255,255,255,0.18);
        }
        #log-panel::-webkit-scrollbar { width: calc(18 * var(--u)); }
        #log-panel::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.12);
            border-left: calc(1 * var(--u)) solid rgba(255,255,255,0.35);
            border-right: calc(1 * var(--u)) solid rgba(255,255,255,0.35);
        }
        #log-panel::-webkit-scrollbar-thumb {
            background: linear-gradient(90deg, #fff8dc, #ffffff 45%, #f0b73a);
            border: calc(2 * var(--u)) solid rgba(158,100,20,0.85);
            border-radius: calc(2 * var(--u));
        }
        #log-list {
            max-width: calc(805 * var(--u));
            margin: 0 auto;
            color: #f7f7f7;
            font-family: "Segoe UI", sans-serif;
            text-shadow: 0 calc(2 * var(--u)) calc(3 * var(--u)) #000, 0 0 calc(3 * var(--u)) #000;
        }
        .log-entry { margin: 0 0 calc(25 * var(--u)); }
        .log-speaker {
            margin: 0 0 calc(12 * var(--u));
            font-size: calc(25 * var(--u));
            line-height: 1.1;
            font-weight: 700;
        }
        .log-text {
            margin: 0;
            padding-left: calc(44 * var(--u));
            white-space: pre-line;
            font-size: calc(28 * var(--u));
            line-height: 1.45;
            font-weight: 600;
        }
        .log-empty {
            margin-top: calc(180 * var(--u));
            text-align: center;
            color: rgba(255,255,255,0.72);
            font-size: calc(24 * var(--u));
        }
    </style>
</head>
<body>
    <audio id="bgm-player" loop></audio>
    <audio id="se-player"></audio>
    <audio id="choice-se-player" preload="auto" src="./audio/choice-select.mp3"></audio>

    <!-- CHAPTER SELECT -->
    <div id="chapter-screen">
        <div id="chapter-header">
            <div id="ch-title">FGO READER</div>
            <div id="ch-subtitle">Fate / Grand Order — Story Viewer</div>
        </div>
        <div id="chapter-grid"></div>
    </div>

    <!-- QUEST SELECT -->
    <div id="quest-screen">
        <button id="quest-back" onclick="showChapterScreen()">← Back</button>
        <img id="quest-war-banner" src="" alt="">
        <div id="quest-war-title"></div>
        <div id="quest-list-container"></div>
        <div id="quest-launch-bar">
            <div id="quest-log"></div>
        </div>
    </div>

    <!-- READER -->
    <div id="reader-container">
        <button id="options-btn" onclick="toggleOptions()">⚙</button>
        <div id="options-overlay" onclick="toggleOptions()">
            <div id="options-box" onclick="event.stopPropagation()">
                <h3>Options</h3>
                <div class="opt-row">
                    <span class="opt-label">Music volume <span id="vol-val">50%</span></span>
                    <input id="volume-slider" type="range" min="0" max="100" value="50" oninput="setVolume(this.value)">
                </div>
                <button class="opt-btn" onclick="stop()">↩ Back to menu</button>
            </div>
        </div>
        <div id="end-overlay">
            <div id="end-box">
                <h2>Chapter complete</h2>
                <p id="end-next-label"></p>
                <button id="btn-next-quest" onclick="goNextQuest()">Next chapter →</button>
                <button id="btn-back-menu" onclick="stop()">Back to menu</button>
            </div>
        </div>
        <div id="visual-stage">
            <div id="camera-layer">
                <div id="bg-layer"></div>
                <div id="cut-image"></div>
                <div id="characters-layer"></div>
            </div>
        </div>
        <div id="wipe-layer"></div>
        <div id="fade-layer"></div>
        <div id="flash-layer"></div>
        <div id="text-box">
            <div id="speaker-tab"><div id="speaker"></div></div>
            <div id="text"></div>
            <div id="text-overflow-indicator" aria-hidden="true"></div>
            <div id="dialog-controls">
                <button id="dialog-log-button" type="button" onclick="openDialogueLog(event)" aria-label="Open reading log">
                    <div class="dialog-log-arrow"></div>
                    <div class="dialog-log">LOG</div>
                </button>
                <div class="dialog-auto-button"></div>
                <div class="dialog-auto">AUTO</div>
            </div>
            <div id="next-icon"></div>
        </div>
        <div id="log-overlay" aria-hidden="true">
            <div id="log-panel">
                <div id="log-list"></div>
            </div>
        </div>
        <div id="choice-overlay">
            <div id="choice-box"><p>Make a choice</p></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
